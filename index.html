<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OmegaSwiss</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
            crossorigin="anonymous"
            defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
            defer></script>
    <script type="module" src="./src/main.ts" defer></script>
</head>
<body>
<h1 id="mainTitle">
    Omega Swiss
</h1>

<div class="card">
    <div class="navbar navbar-light bg-light" id="headingOne"
         data-bs-toggle="collapse" data-bs-target="#collapseOne"
         aria-expanded="true" aria-controls="collapseOne">
        <h5 class="mb-0">
            <button class="btn btn-link">
                Jugadores
            </button>
        </h5>
    </div>
    <div id="collapseOne" class="collapse show" aria-labelledby="headingOne" data-bs-parent="#accordion">
        <div class="card-body">
            <div class="row">
                <div class="form-group col-3">
                    <label for="player-name-input" class="visually-hidden">Nombre o alias</label>
                    <input id="player-name-input" class="form-control col-1" type="text" placeholder="Nombre/Alias">
                </div>
                <div class="form-group col-3">
                    <button id="new-player" type="button" class="btn btn-primary text-nowrap">+ Jugador</button>
                </div>
                <div class="form-group col-3 invisible">
                    <button id="export-players" type="button" class="btn btn-primary text-nowrap">Export
                    </button>
                    <button id="import-players" type="button" class="btn btn-primary text-nowrap">Export
                    </button>
                </div>
            </div>
            <div class="row p-1">
                <table id="player-table" class="table table-striped table-bordered">
                    <thead>
                    <tr class="table-dark">
                        <th scope="col" class="col-12"></th>
                        <th scope="col" class="col"></th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider">
                    <tr>
                        <td>${playerName}</td>
                        <th scope="row">
                            <button type="button" class="btn-delete-player btn btn-danger" data-related="${playerId}">D</button>
                        </th>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <h5 id="requiredRoundDisplay">Ronda X</h5>
    </div>
</div>

<table id="mainTable" class="table table-striped table-bordered">
    <thead>
    <tr class="table-dark">
        <th scope="col" class="col"></th>
        <th scope="col" class="col-6"></th>
        <th scope="col" class="col"></th>
        <th scope="col" class="col-6"></th>
    </tr>
    </thead>
    <tbody class="table-group-divider">
    <tr class="match-row">
        <th scope="row" class="text-center">1</th>
        <td class="cell-player-A table-success">Player 1</td>
        <td>
            <button type="button" class="btn btn-warning col-12">Empate</button>
            <button type="button" class="btn btn-danger col-12 text-nowrap">Doble KO</button>
        </td>
        <td class="cell-player-B table-danger">Player 2</td>
    </tr>
    <tr class="match-row">
        <th scope="row" class="text-center">2</th>
        <td class="cell-player-A table-warning">Player 3</td>
        <td>
            <button type="button" class="btn btn-warning col-12">Empate</button>
            <button type="button" class="btn btn-danger col-12 text-nowrap">Doble KO</button>
        </td>
        <td class="cell-player-B table-warning">Player 4</td>
    </tr>
    <tr class="match-row">
        <th scope="row" class="text-center">3</th>
        <td class="cell-player-A table-danger">Player 5</td>
        <td>
            <button type="button" class="btn btn-warning col-12">Empate</button>
            <button type="button" class="btn btn-danger col-12 text-nowrap">Doble KO</button>
        </td>
        <td class="cell-player-B table-danger">Player 6</td>
    </tr>
    <tr class="match-row">
        <th scope="row" class="text-center">4</th>
        <td class="cell-player-A table-success">Player 7</td>
        <td>
            <button type="button" class="btn btn-warning col-12">Empate</button>
            <button type="button" class="btn btn-danger col-12 text-nowrap">Doble KO</button>
        </td>
        <td class="cell-player-B table-danger">Bye</td>
    </tr>
    </tbody>
</table>
</body>
</html>
