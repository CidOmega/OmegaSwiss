<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OmegaSwiss</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
            crossorigin="anonymous"
            defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
            defer></script>
    <script type="module" src="./src/main.ts" defer></script>
</head>
<body>
<h1 id="mainTitle">
    Omega Swiss
</h1>

<div class="card">
    <div class="navbar navbar-light bg-light" id="headingOne"
         data-bs-toggle="collapse" data-bs-target="#collapseOne"
         aria-expanded="true" aria-controls="collapseOne">
        <h5 class="mb-0">
            <button class="btn btn-link">
                Jugadores
            </button>
        </h5>
    </div>
    <div id="collapseOne" class="collapse show" aria-labelledby="headingOne" data-bs-parent="#accordion">
        <div class="card-body">
            <div class="row">
                <div class="form-group col-3">
                    <label for="player-name-input" class="visually-hidden">Nombre o alias</label>
                    <input id="player-name-input" class="form-control col-1" type="text" placeholder="Nombre/Alias">
                </div>
                <div class="form-group col-3">
                    <button id="new-player" type="button" class="btn btn-primary text-nowrap">+ Jugador</button>
                </div>
                <div class="form-group col-3 invisible">
                    <button id="export-players" type="button" class="btn btn-primary text-nowrap">Export
                    </button>
                    <button id="import-players" type="button" class="btn btn-primary text-nowrap">Export
                    </button>
                </div>
            </div>
            <div class="row p-1">
                <table id="player-table" class="table table-striped table-bordered">
                    <thead>
                    <tr class="table-dark">
                        <th scope="col" class="col-12"></th>
                        <th scope="col" class="col"></th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider"></tbody>
                </table>
            </div>
        </div>
        <h5 id="requiredRoundDisplay">Rondas necesarias: 0</h5>
    </div>
</div>
<div class="card">
    <div class="navbar navbar-light bg-light" id="headingTwo"
         data-bs-toggle="collapse" data-bs-target="#collapseTwo"
         aria-expanded="true" aria-controls="collapseTwo">
        <h5 class="mb-0">
            <button class="btn btn-link">
                Torneo
            </button>
        </h5>
    </div>
    <div id="collapseTwo" class="collapse show" aria-labelledby="headingTwo" data-bs-parent="#accordion">
        <div class="card-body">
            <div class="row m-1">
                <div class="col-6 text-start">
                    <h5 id="roundCountDisplay" style="display: none">Ronda X/Y</h5>
                    <button id="startTournament" type="button" class="btn btn-primary text-nowrap">Empezar</button>
                </div>
                <div id="swapDrawContainer" class="col-6 text-end">
                    <div class="row">
                        <div class="col-12 col-lg-10">
                            <div class="row">
                                <p class="col-12">Cambiar modalidad:</p>
                            </div>
                        </div>
                        <div class="col-12 col-lg-2">
                            <button type="button" class="btn-draw btn btn-warning text-nowrap"
                                    style="display: none">
                                Empate
                            </button>
                            <button type="button" class="btn-double-ko btn btn-danger text-nowrap"
                                    style="display: none">
                                Doble KO
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <table id="mainTable" class="table table-striped table-bordered">
                    <thead>
                    <tr class="table-dark">
                        <th scope="col" class="col"></th>
                        <th scope="col" class="col-6"></th>
                        <th scope="col" class="col"></th>
                        <th scope="col" class="col-6"></th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
